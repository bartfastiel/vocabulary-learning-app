# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Replace version number and cache-bust all JS imports
        run: |
          VERSION=$(date -u +"%Y.%m.%d-%H%M%S")
          echo "Version: $VERSION"
          sed -i "s/Entwicklungsversion/$VERSION/g" index.html
          # Add ?v=VERSION to all JS import statements so Safari fetches fresh files
          find . -name '*.js' -not -path './node_modules/*' -not -path './.git/*' | while read f; do
            sed -i -E "s|from \"(\./[^\"]+\.js)\"|from \"\1?v=$VERSION\"|g" "$f"
            sed -i -E "s|import \"(\./[^\"]+\.js)\"|import \"\1?v=$VERSION\"|g" "$f"
            sed -i -E "s|from \"(\.\./[^\"]+\.js)\"|from \"\1?v=$VERSION\"|g" "$f"
            sed -i -E "s|import \"(\.\./[^\"]+\.js)\"|import \"\1?v=$VERSION\"|g" "$f"
          done
          echo "Cache-busted all JS imports with version $VERSION"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
