name: Setup Supabase Database
on:
  push:
    paths:
      - '.github/workflows/setup-db.yml'
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pg module
        run: npm install pg

      - name: Run migration
        run: |
          node << 'ENDSCRIPT'
          const { Client } = require('pg');

          const SQL = `
          CREATE TABLE IF NOT EXISTS profiles (
            id text PRIMARY KEY,
            name text NOT NULL,
            role text DEFAULT 'schueler',
            points integer DEFAULT 0,
            streak_record integer DEFAULT 0,
            avatar_svg text,
            group_code text,
            created_at timestamptz DEFAULT now()
          );
          CREATE TABLE IF NOT EXISTS groups (
            id text PRIMARY KEY,
            name text NOT NULL,
            teacher_id text REFERENCES profiles(id),
            join_code text UNIQUE,
            settings jsonb DEFAULT '{}',
            created_at timestamptz DEFAULT now()
          );
          CREATE TABLE IF NOT EXISTS group_members (
            group_id text REFERENCES groups(id) ON DELETE CASCADE,
            profile_id text REFERENCES profiles(id) ON DELETE CASCADE,
            joined_at timestamptz DEFAULT now(),
            PRIMARY KEY (group_id, profile_id)
          );
          ALTER TABLE profiles ENABLE ROW LEVEL SECURITY;
          ALTER TABLE groups ENABLE ROW LEVEL SECURITY;
          ALTER TABLE group_members ENABLE ROW LEVEL SECURITY;
          DO $$ BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE policyname='pub_read_profiles') THEN CREATE POLICY pub_read_profiles ON profiles FOR SELECT USING (true); END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE policyname='pub_insert_profiles') THEN CREATE POLICY pub_insert_profiles ON profiles FOR INSERT WITH CHECK (true); END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE policyname='pub_update_profiles') THEN CREATE POLICY pub_update_profiles ON profiles FOR UPDATE USING (true); END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE policyname='pub_read_groups') THEN CREATE POLICY pub_read_groups ON groups FOR SELECT USING (true); END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE policyname='pub_insert_groups') THEN CREATE POLICY pub_insert_groups ON groups FOR INSERT WITH CHECK (true); END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE policyname='pub_update_groups') THEN CREATE POLICY pub_update_groups ON groups FOR UPDATE USING (true); END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE policyname='pub_read_members') THEN CREATE POLICY pub_read_members ON group_members FOR SELECT USING (true); END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE policyname='pub_insert_members') THEN CREATE POLICY pub_insert_members ON group_members FOR INSERT WITH CHECK (true); END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE policyname='pub_delete_members') THEN CREATE POLICY pub_delete_members ON group_members FOR DELETE USING (true); END IF;
          END $$;
          NOTIFY pgrst, 'reload schema';
          `;

          async function tryConnect(config, label) {
            const client = new Client(config);
            try {
              await client.connect();
              console.log(label + ': connected!');
              await client.query(SQL);
              console.log(label + ': migration SUCCESS!');
              const res = await client.query("SELECT tablename FROM pg_tables WHERE schemaname='public' ORDER BY tablename");
              console.log('Tables:', res.rows.map(r => r.tablename).join(', '));
              await client.end();
              return true;
            } catch (e) {
              console.log(label + ': FAILED -', e.message);
              try { await client.end(); } catch {}
              return false;
            }
          }

          (async () => {
            // Try direct connection
            let ok = await tryConnect({
              host: 'db.anrwjfidqqjivatjarrg.supabase.co',
              port: 5432, database: 'postgres', user: 'postgres',
              password: '!X,?N7mT%umv,YJ',
              ssl: { rejectUnauthorized: false },
              connectionTimeoutMillis: 10000,
            }, 'Direct');

            if (!ok) {
              // Try pooler EU
              ok = await tryConnect({
                host: 'aws-0-eu-central-1.pooler.supabase.com',
                port: 5432, database: 'postgres',
                user: 'postgres.anrwjfidqqjivatjarrg',
                password: '!X,?N7mT%umv,YJ',
                ssl: { rejectUnauthorized: false },
                connectionTimeoutMillis: 10000,
              }, 'Pooler-EU');
            }

            if (!ok) {
              // Try pooler US
              ok = await tryConnect({
                host: 'aws-0-us-east-1.pooler.supabase.com',
                port: 5432, database: 'postgres',
                user: 'postgres.anrwjfidqqjivatjarrg',
                password: '!X,?N7mT%umv,YJ',
                ssl: { rejectUnauthorized: false },
                connectionTimeoutMillis: 10000,
              }, 'Pooler-US');
            }

            if (!ok) {
              console.error('All connection methods failed!');
              process.exit(1);
            }
          })();
          ENDSCRIPT
