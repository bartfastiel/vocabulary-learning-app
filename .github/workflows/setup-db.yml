name: Setup Supabase Database
on:
  push:
    paths:
      - '.github/workflows/setup-db.yml'
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Create tables
        env:
          PGPASSWORD: "!X,?N7mT%umv,YJ"
        run: |
          psql "postgresql://postgres@db.anrwjfidqqjivatjarrg.supabase.co:5432/postgres" <<'SQL'

          -- Profiles
          CREATE TABLE IF NOT EXISTS profiles (
            id text PRIMARY KEY,
            name text NOT NULL,
            role text DEFAULT 'schueler',
            points integer DEFAULT 0,
            streak_record integer DEFAULT 0,
            avatar_svg text,
            group_code text,
            created_at timestamptz DEFAULT now()
          );

          -- Groups
          CREATE TABLE IF NOT EXISTS groups (
            id text PRIMARY KEY,
            name text NOT NULL,
            teacher_id text REFERENCES profiles(id),
            join_code text UNIQUE,
            settings jsonb DEFAULT '{}',
            created_at timestamptz DEFAULT now()
          );

          -- Group members
          CREATE TABLE IF NOT EXISTS group_members (
            group_id text REFERENCES groups(id) ON DELETE CASCADE,
            profile_id text REFERENCES profiles(id) ON DELETE CASCADE,
            joined_at timestamptz DEFAULT now(),
            PRIMARY KEY (group_id, profile_id)
          );

          -- Enable RLS
          ALTER TABLE profiles ENABLE ROW LEVEL SECURITY;
          ALTER TABLE groups ENABLE ROW LEVEL SECURITY;
          ALTER TABLE group_members ENABLE ROW LEVEL SECURITY;

          -- Policies (idempotent with DO block)
          DO $$ BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE policyname='pub_read_profiles') THEN
              CREATE POLICY pub_read_profiles ON profiles FOR SELECT USING (true);
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE policyname='pub_insert_profiles') THEN
              CREATE POLICY pub_insert_profiles ON profiles FOR INSERT WITH CHECK (true);
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE policyname='pub_update_profiles') THEN
              CREATE POLICY pub_update_profiles ON profiles FOR UPDATE USING (true);
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE policyname='pub_read_groups') THEN
              CREATE POLICY pub_read_groups ON groups FOR SELECT USING (true);
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE policyname='pub_insert_groups') THEN
              CREATE POLICY pub_insert_groups ON groups FOR INSERT WITH CHECK (true);
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE policyname='pub_update_groups') THEN
              CREATE POLICY pub_update_groups ON groups FOR UPDATE USING (true);
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE policyname='pub_read_members') THEN
              CREATE POLICY pub_read_members ON group_members FOR SELECT USING (true);
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE policyname='pub_insert_members') THEN
              CREATE POLICY pub_insert_members ON group_members FOR INSERT WITH CHECK (true);
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE policyname='pub_delete_members') THEN
              CREATE POLICY pub_delete_members ON group_members FOR DELETE USING (true);
            END IF;
          END $$;

          SELECT 'SUCCESS: All tables and policies created!' as result;
          SQL
