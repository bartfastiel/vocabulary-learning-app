<!DOCTYPE html>
<html><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Import Test</title>
<style>body{font-family:monospace;padding:1rem;font-size:14px;background:#111;color:#4ade80}
.err{color:#f87171}.ok{color:#4ade80}</style>
</head><body>
<h3>Module Import Test</h3>
<div id="log"></div>
<script type="module">
const log = document.getElementById("log");
function ok(m) { log.innerHTML += '<div class="ok">OK: ' + m + '</div>'; }
function fail(m, e) { log.innerHTML += '<div class="err">FAIL: ' + m + ' - ' + e + '</div>'; }

const tests = [
  ["core/profiles.js", () => import("./core/profiles.js")],
  ["core/supabase.js", () => import("./core/supabase.js")],
  ["core/audio.js", () => import("./core/audio.js")],
  ["core/qr-code.js", () => import("./core/qr-code.js")],
  ["core/avatar-builder.js", () => import("./core/avatar-builder.js")],
  ["core/cloud-sync.js", () => import("./core/cloud-sync.js")],
  ["core/help-overlay.js", () => import("./core/help-overlay.js")],
  ["core/group-board.js", () => import("./core/group-board.js")],
  ["core/invite-qr.js", () => import("./core/invite-qr.js")],
  ["core/teacher-controls.js", () => import("./core/teacher-controls.js")],
  ["core/cloud-login.js", () => import("./core/cloud-login.js")],
  ["vocab/points.js", () => import("./vocab/points.js")],
  ["vocab/vocab.js", () => import("./vocab/vocab.js")],
  ["vocab/vocab-editor.js", () => import("./vocab/vocab-editor.js")],
  ["math/math-trainer.js", () => import("./math/math-trainer.js")],
  ["deutsch/deutsch-trainer.js", () => import("./deutsch/deutsch-trainer.js")],
  ["game/game-lobby.js", () => import("./game/game-lobby.js")],
  ["core/app-shell.js", () => import("./core/app-shell.js")],
];

for (const [name, fn] of tests) {
  try { await fn(); ok(name); } catch(e) { fail(name, e.message); }
}
log.innerHTML += '<br><div>DONE</div>';
</script>
</body></html>
