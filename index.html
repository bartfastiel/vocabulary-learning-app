<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
    <meta http-equiv="Pragma" content="no-cache"/>
    <meta http-equiv="Expires" content="0"/>
    <title>Lerntrainer</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background: #f0f4f8;
            font-family: "Segoe UI", system-ui, sans-serif;
        }
        #version {
            position: fixed;
            bottom: 5px;
            right: 10px;
            font-size: 0.8em;
            color: #00000050;
        }
        * {
            -webkit-user-select: none;
            user-select: none;
        }
        #error-box {
            display: none;
            position: fixed; top: 0; left: 0; right: 0;
            background: #e53e3e; color: white;
            padding: 1rem; font-size: 0.8rem;
            word-break: break-all; z-index: 99999;
            max-height: 50vh; overflow-y: auto;
        }
        #loading {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; color: #718096;
        }
    </style>
</head>
<body>
<div id="loading">Laden...</div>
<div id="error-box"></div>
<app-shell></app-shell>

<!-- preload audio for instant playback -->
<audio src="assets/audio/ding.mp3" preload="auto"></audio>
<audio src="assets/audio/buzz.mp3" preload="auto"></audio>

<script>
    // Emergency reset
    if (location.search.includes("reset=1")) {
        localStorage.clear();
        location.href = location.pathname;
    }

    // Catch ALL errors including module errors
    function showError(msg) {
        var box = document.getElementById("error-box");
        box.style.display = "block";
        box.innerHTML += "<p>" + msg + "</p>";
        document.getElementById("loading").style.display = "none";
    }

    window.onerror = function(msg, url, line) {
        showError("JS Error: " + msg + " in " + url + ":" + line);
    };

    window.addEventListener("unhandledrejection", function(e) {
        showError("Promise Error: " + (e.reason?.message || e.reason || "unknown"));
    });

    // Load the app as a module with error handling
    var design = localStorage.getItem("appDesign") || "modern";
    var file = design === "classic" ? "app-shell-classic.js" : "app-shell.js";

    import("./core/" + file).then(function() {
        document.getElementById("loading").style.display = "none";
    }).catch(function(err) {
        showError("Module Load Error: " + err.message + "<br><br>Stack: " + (err.stack || "none"));
    });
</script>
<div id="version">Entwicklungsversion</div>
</body>
</html>
